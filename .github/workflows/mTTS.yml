name: mCloudTTS-Pro (Enhanced)

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Language Code'
        required: true
        default: 'en-us'
        type: choice
        options: [en-us, en-gb, ja-jp, zh-cn, es-es, fr-fr, hi-in, it-it, pt-br]
      voices:
        description: 'Voices (e.g., af_bella, am_adam)'
        required: true
        default: 'af_bella,af_sky'
      response_format:
        description: 'Audio Formats'
        required: true
        default: 'mp3,wav'
      speed:
        description: 'Speed (0.5 - 2.0)'
        required: true
        default: '1.0'
      projectName:
        description: 'Project (Format: ProjID: Title)'
        required: true
        default: 'MT-001: Test Project'
      text:
        description: 'Input Text'
        required: true
        default: 'Hello, this is a test of the enhanced mCloud TTS system.'
      jobid:
        description: 'Custom Job ID (Optional)'
        required: false

# Prevent race conditions on samples.json
concurrency:
  group: tts-generation
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    
    services:
      kokoro:
        image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
        ports:
          - 8880:8880
        options: >-
          --health-cmd "curl -f http://localhost:8880/v1/models || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: 📥 Checkout Storage
        uses: actions/checkout@v4
        with:
          repository: TheOpsGuru/mCloudTTS
          token: ${{ secrets.GH_PERSONAL_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: pip install requests mutagen

      - name: 🎙️ Run Enhanced Generator
        id: tts_gen
        env:
          INPUT_TEXT: ${{ inputs.text }}
          INPUT_LANGUAGE: ${{ inputs.language }}
          INPUT_VOICES: ${{ inputs.voices }}
          INPUT_FORMATS: ${{ inputs.response_format }}
          INPUT_SPEED: ${{ inputs.speed }}
          PROJECT_NAME: ${{ inputs.projectName }}
          JOB_ID: ${{ inputs.jobid }}
          API_URL: "http://localhost:8880/v1/audio/speech"
          REPO_INFO: "${{ github.repository_owner }}/mCloudTTS"
        run: |
          python <<EOF
          import os, json, requests, datetime, hashlib
          from mutagen import File
          from pathlib import Path

          def get_voice_profile(v):
              p = {"lang": "Unknown", "gender": "Unknown", "region": "Unknown"}
              m = {
                  "af_": ("English", "Female", "USA"), "am_": ("English", "Male", "USA"),
                  "bf_": ("English", "Female", "UK"), "bm_": ("English", "Male", "UK"),
                  "jf_": ("Japanese", "Female", "Japan"), "zm_": ("Chinese", "Male", "China"),
                  "zf_": ("Chinese", "Female", "China"), "es_": ("Spanish", "Mix", "Spain"),
                  "fr_": ("French", "Mix", "France"), "hi_": ("Hindi", "Mix", "India")
              }
              for k, val in m.items():
                  if v.startswith(k):
                      p.update({"lang": val[0], "gender": val[1], "region": val[2]})
                      break
              return p

          # Setup
          text = os.getenv("INPUT_TEXT")
          lang = os.getenv("INPUT_LANGUAGE")
          voices = [v.strip() for v in os.getenv("INPUT_VOICES").split(",")]
          formats = [f.strip() for f in os.getenv("INPUT_FORMATS").split(",")]
          speed = float(os.getenv("INPUT_SPEED", 1.0))
          
          raw_proj = os.getenv("PROJECT_NAME", "GEN: Untitled")
          proj_id, proj_title = map(str.strip, raw_proj.split(":", 1)) if ":" in raw_proj else ("GEN", raw_proj)
          job_id = os.getenv("JOB_ID") or f"job-{int(datetime.datetime.now().timestamp())}"
          
          out_dir = Path("generated_files")
          out_dir.mkdir(exist_ok=True)
          json_path = Path("samples.json")
          
          data = {"project": "mCloudTTS", "voices": []}
          if json_path.exists():
              with open(json_path, 'r') as f: data = json.load(f)

          results = []
          for v in voices:
              for fmt in formats:
                  safe_v = v.replace("(", "").replace(")", "").replace("+", "_")
                  fname = f"{proj_title.replace(' ', '_')}_{safe_v}.{fmt}"
                  fpath = out_dir / fname
                  
                  payload = {"model": "kokoro", "input": text, "voice": v, "response_format": fmt, "speed": speed}
                  try:
                      resp = requests.post(os.getenv("API_URL"), json=payload, timeout=120)
                      if resp.status_code == 200:
                          fpath.write_bytes(resp.content)
                          
                          # Analysis
                          audio = File(fpath)
                          duration = audio.info.length if audio else 0
                          sha = hashlib.sha256(resp.content).hexdigest()[:10]
                          profile = get_voice_profile(v)
                          
                          entry = {
                              "jobid": job_id, "name": fname, "project": proj_id,
                              "url": f"https://github.com/{os.getenv('REPO_INFO')}/releases/download/mTTS/{fname}",
                              "title": f"{proj_title} ({v})", "lang_code": lang,
                              "voice_id": v, "gender": profile["gender"], "duration": round(duration, 2),
                              "size": len(resp.content), "sha": sha,
                              "timestamp": datetime.datetime.now(datetime.timezone.utc).isoformat()
                          }
                          results.append(entry)
                          print(f"✅ Created {fname}")
                      else:
                          print(f"❌ Error {resp.status_code} for {v}")
                  except Exception as e:
                      print(f"⚠️ Failed {v}: {e}")

          # Update JSON
          existing = {i['name']: i for i in data.get('voices', [])}
          for r in results: existing[r['name']] = r
          data['voices'] = list(existing.values())
          json_path.write_text(json.dumps(data, indent=2))
          
          # Markdown Summary for GitHub UI
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as s:
              s.write(f"### 🎙️ TTS Generation Summary (Job: {job_id})\n")
              s.write("| File | Voice | Duration | Size |\n|---|---|---|---|\n")
              for r in results:
                  s.write(f"| {r['name']} | {r['voice_id']} | {r['duration']}s | {round(r['size']/1024, 1)} KB |\n")
          EOF

      - name: 🚀 Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mTTS
          files: generated_files/*
          token: ${{ secrets.GH_PERSONAL_TOKEN }}
          repository: TheOpsGuru/mCloudTTS

      - name: 💾 Sync Metadata
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update samples.json [job ${{ inputs.jobid }}]"
          file_pattern: 'samples.json'
          repository: .
