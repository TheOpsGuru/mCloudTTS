name: "TTS: Generate & Release"

on:
  workflow_dispatch:
    inputs:
      text_prompt:
        description: 'Text to synthesize'
        required: true
        type: string
        default: 'Optimized TTS generation via GitHub Actions.'
      voice:
        description: 'Voice ID'
        required: true
        type: choice
        options: [af_bella, af_sky, af_heart, am_adam]
        default: 'af_bella'
      file_format:
        description: 'Output format'
        required: true
        type: choice
        options: [mp3, wav, opus, flac]
        default: 'mp3'

permissions:
  contents: write
  dispatches: write

concurrency:
  group: tts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  synthesize:
    name: Generate Audio
    runs-on: ubuntu-latest
    
    # Using Service Containers is the best practice for background APIs
    services:
      kokoro:
        image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
        ports:
          - 8880:8880
        # Optional: Add healthchecks if the image supports it
        options: >-
          --health-cmd "curl -f http://localhost:8880/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Service Health
        run: |
          echo "Waiting for Kokoro API to initialize..."
          for i in {1..20}; do
            if curl -s http://localhost:8880/health; then
              echo "API is online."
              exit 0
            fi
            sleep 5
          done
          echo "Service timed out." && exit 1

      - name: Request Synthesis
        shell: bash
        env:
          INPUT_TEXT: ${{ inputs.text_prompt }}
          VOICE: ${{ inputs.voice }}
          FORMAT: ${{ inputs.file_format }}
          FILENAME: "speech_output.${{ inputs.file_format }}"
        run: |
          curl -s -X 'POST' 'http://localhost:8880/v1/audio/speech' \
            -H 'Content-Type: application/json' \
            -d "{
              \"model\": \"kokoro\",
              \"input\": \"$INPUT_TEXT\",
              \"voice\": \"$VOICE\",
              \"response_format\": \"$FORMAT\"
            }" \
            --output "$FILENAME"
          
          echo "ASSET_PATH=$FILENAME" >> $GITHUB_ENV

      - name: Generate Release Tag
        id: tag
        run: echo "release_tag=tts-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "TTS Generation: ${{ steps.tag.outputs.release_tag }}"
          body: |
            ### Metadata
            - **Voice:** ${{ inputs.voice }}
            - **Format:** ${{ inputs.file_format }}
            - **Prompt:** ${{ inputs.text_prompt }}
          files: ${{ env.ASSET_PATH }}
          draft: false
          prerelease: false
