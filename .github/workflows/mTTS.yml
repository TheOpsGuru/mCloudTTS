name: mCloudTTS-Pro (Enhanced)

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Language Code'
        required: true
        default: 'en-us'
        type: choice
        options: [en-us, en-gb, ja-jp, zh-cn, es-es, fr-fr, hi-in, it-it, pt-br]
      voices:
        description: 'Voices (e.g., af_bella,am_adam,af_bella(2)+af_heart(1))'
        required: true
        default: 'af_bella,af_sky,af_bella(2)+af_heart(1)'
      response_format:
        description: 'Audio Formats'
        required: true
        default: 'mp3,wav,opus,flac,m4a,pcm'
      speed:
        description: 'Speed (0.5 - 2.0)'
        required: true
        default: '1.0'
      projectName:
        description: 'Project (Format: ProjID: Title)'
        required: true
        default: 'MT-001: Test Project'
      text:
        description: 'Input Text'
        required: true
        default: 'Welcome to mCloudTTS-Pro, the next generation of cloud-based speech synthesis. Whether you’re creating content for global audiences, building accessible applications, or narrating your next big project, our professional-grade AI voices provide the clarity and emotion you need. Experience the future of natural sound, delivered directly from the cloud'
      jobid:
        description: 'Custom Job ID (Optional)'
        required: false
      releasetag:
        description: 'Release tag'
        default: 'mTTS'
        required: false

# Concurrency group ensures that while multiple workflows can queue, 
# they won't conflict during the critical JSON write phase.
concurrency:
  group: tts-storage-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    
    services:
      kokoro:
        image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
        ports:
          - 8880:8880
        options: >-
          --health-cmd "curl -f http://localhost:8880/v1/models || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: 📥 Checkout Storage
        uses: actions/checkout@v4
        with:
          repository: TheOpsGuru/mCloudTTS
          token: ${{ secrets.GH_PERSONAL_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: pip install requests mutagen

      - name: 🎙️ Run Optimized Generator
        id: tts_gen
        env:
          INPUT_TEXT: ${{ inputs.text }}
          INPUT_LANGUAGE: ${{ inputs.language }}
          INPUT_VOICES: ${{ inputs.voices }}
          INPUT_FORMATS: ${{ inputs.response_format }}
          INPUT_SPEED: ${{ inputs.speed }}
          PROJECT_NAME: ${{ inputs.projectName }}
          JOB_ID: ${{ inputs.jobid }}
          API_URL: "http://localhost:8880/v1/audio/speech"
          REPO_INFO: "${{ github.repository_owner }}/mCloudTTS"
          RELEASE_TAG: ${{ inputs.releasetag }}
        run: |
          python <<EOF
          import os, json, requests, datetime, hashlib, time
          from mutagen import File
          from pathlib import Path

          def get_voice_profile(v):
              p = {"lang": "Unknown", "gender": "Unknown", "region": "Unknown"}
              m = {
                  "af_": ("English", "Female", "USA"), "am_": ("English", "Male", "USA"),
                  "bf_": ("English", "Female", "UK"), "bm_": ("English", "Male", "UK"),
                  "jf_": ("Japanese", "Female", "Japan"), "zm_": ("Chinese", "Male", "China"),
                  "zf_": ("Chinese", "Female", "China"), "es_": ("Spanish", "Mix", "Spain"),
                  "fr_": ("French", "Mix", "France"), "hi_": ("Hindi", "Mix", "India")
              }
              for k, val in m.items():
                  if v.startswith(k):
                      p.update({"lang": val[0], "gender": val[1], "region": val[2]})
                      break
              return p

          def format_size(bytes_num):
              for unit in ['B', 'KB', 'MB', 'GB']:
                  if bytes_num < 1024.0:
                      return f"{bytes_num:.2f} {unit}"
                  bytes_num /= 1024.0
              return f"{bytes_num:.2f} GB"

          def format_duration(seconds):
              if seconds < 60:
                  return f"{seconds:.2f}s"
              minutes = int(seconds // 60)
              rem_seconds = seconds % 60
              return f"{minutes}m {rem_seconds:.1f}s"

          # Config & Setup
          text = os.getenv("INPUT_TEXT")
          lang = os.getenv("INPUT_LANGUAGE")
          voices = [v.strip() for v in os.getenv("INPUT_VOICES").split(",") if v.strip()]
          formats = [f.strip() for f in os.getenv("INPUT_FORMATS").split(",") if f.strip()]
          speed = float(os.getenv("INPUT_SPEED", 1.0))
          
          raw_proj = os.getenv("PROJECT_NAME", "GEN: Untitled")
          proj_id, proj_title = map(str.strip, raw_proj.split(":", 1)) if ":" in raw_proj else ("GEN", raw_proj)
          job_id = os.getenv("JOB_ID") or f"job-{int(time.time())}"
          release_tag = os.getenv("RELEASE_TAG", "mTTS")
          
          out_dir = Path("generated_files")
          out_dir.mkdir(exist_ok=True)
          json_path = Path("samples.json")
          
          results = []
          # Use a session for connection pooling (faster for multiple requests)
          session = requests.Session()

          try:
              for v in voices:
                  for fmt in formats:
                      safe_v = v.replace("(", "").replace(")", "").replace("+", "_")
                      fname = f"{proj_title.replace(' ', '_')}_{safe_v}.{fmt}"
                      fpath = out_dir / fname
                      
                      payload = {"model": "kokoro", "input": text, "voice": v, "response_format": fmt, "speed": speed}
                      try:
                          resp = session.post(os.getenv("API_URL"), json=payload, timeout=300)
                          if resp.status_code == 200:
                              fpath.write_bytes(resp.content)
                              
                              # Analysis
                              audio = File(fpath)
                              duration = audio.info.length if audio else 0
                              sha = hashlib.sha256(resp.content).hexdigest()[:10]
                              profile = get_voice_profile(v)
                              
                              size_bytes = len(resp.content)
                              
                              results.append({
                                  "jobid": job_id, "name": fname, "project": proj_id,
                                  "url": f"https://github.com/{os.getenv('REPO_INFO')}/releases/download/{release_tag}/{fname}",
                                  "title": f"{proj_title} ({v})", "lang_code": lang,
                                  "voice_id": v, "gender": profile["gender"], 
                                  "duration": round(duration, 2),
                                  "duration_readable": format_duration(duration),
                                  "size_bytes": size_bytes,
                                  "size_readable": format_size(size_bytes),
                                  "sha": sha,
                                  "timestamp": datetime.datetime.now(datetime.timezone.utc).isoformat()
                              })
                              print(f"✅ Created {fname}")
                          else:
                              print(f"❌ API Error {resp.status_code} for {v} -> {fname}")
                      except Exception as e:
                          print(f"⚠️ Network/Logic failure for {v}: {e}")

              # Critical Section: Update JSON with Retry Logic
              max_retries = 3
              for attempt in range(max_retries):
                  try:
                      data = {"project": "mCloudTTS", "voices": []}
                      if json_path.exists():
                          with open(json_path, 'r') as f: data = json.load(f)

                      existing = {i['name']: i for i in data.get('voices', [])}
                      for r in results: existing[r['name']] = r
                      data['voices'] = list(existing.values())
                      
                      with open(json_path, 'w') as f:
                          json.dump(data, f, indent=2)
                      break # Success
                  except Exception as je:
                      if attempt == max_retries - 1: raise je
                      time.sleep(2) # Wait and try again

          finally:
              # Always write summary even if partial success
              with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as s:
                  s.write(f"### 🎙️ TTS Generation Summary (Job: {job_id})\n")
                  if not results:
                      s.write("> No files were generated successfully.\n")
                  else:
                      s.write("| File | Voice | Duration | Size | Preview |\n|---|---|---|---|---|\n")
                      for r in results:
                          # Use HTML audio tag for a play button/player in the summary
                          player_html = f'<audio src="{r["url"]}" controls preload="none" style="height: 30px;"></audio>'
                          s.write(f"| {r['name']} | {r['voice_id']} | {r['duration_readable']} | {r['size_readable']} | {player_html} |\n")
          EOF

      - name: 🚀 Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.releasetag }}
          files: generated_files/*
          token: ${{ secrets.GH_PERSONAL_TOKEN }}
          repository: TheOpsGuru/mCloudTTS

      - name: 💾 Sync Metadata (Rebase approach)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update samples.json [job ${{ inputs.jobid }}]"
          file_pattern: 'samples.json'
          repository: .
          # Aggressive push to handle simultaneous commits by rebasing
          push_options: '--force'