name: mCloudTTS-Pro (Parallel)

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Language Code'
        required: true
        default: 'en-us'
        type: choice
        options: [en-us, en-gb, ja-jp, zh-cn, es-es, fr-fr, hi-in, it-it, pt-br]
      voices:
        description: 'Voices (e.g., af_bella, am_adam - will run in parallel)'
        required: true
        default: 'af_bella,af_sky,af_heart'
      response_format:
        description: 'Audio Formats'
        required: true
        default: 'mp3,wav'
      speed:
        description: 'Speed (0.5 - 2.0)'
        required: true
        default: '1.0'
      projectName:
        description: 'Project (Format: ProjID: Title)'
        required: true
        default: 'MT-001: Test Project'
      text:
        description: 'Input Text'
        required: true
        default: 'Welcome to mCloudTTS-Pro. This text is being processed by multiple parallel workers simultaneously to save time.'
      jobid:
        description: 'Custom Job ID'
        required: false
      releasetag:
        description: 'Release tag'
        default: 'mTTS'
        required: false

permissions:
  contents: write

jobs:
  # --- JOB 1: PREPARE MATRIX ---
  prepare:
    runs-on: ubuntu-latest
    outputs:
      voice_matrix: ${{ steps.set-matrix.outputs.voices }}
    steps:
      - id: set-matrix
        run: |
          # Convert comma separated string to JSON array for matrix
          VOICES=$(echo "${{ inputs.voices }}" | jq -R -c 'split(",") | map(trimstr(" "))')
          echo "voices=$VOICES" >> $GITHUB_OUTPUT

  # --- JOB 2: PARALLEL GENERATION ---
  generate:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        voice: ${{ fromJson(needs.prepare.outputs.voice_matrix) }}
    
    services:
      kokoro:
        image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
        ports: ["8880:8880"]
        options: >-
          --health-cmd "curl -f http://localhost:8880/v1/models || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: pip install requests mutagen

      - name: 🎙️ Generate Voice Fragment
        id: gen
        env:
          INPUT_TEXT: ${{ inputs.text }}
          INPUT_LANGUAGE: ${{ inputs.language }}
          INPUT_VOICE: ${{ matrix.voice }}
          INPUT_FORMATS: ${{ inputs.response_format }}
          INPUT_SPEED: ${{ inputs.speed }}
          PROJECT_NAME: ${{ inputs.projectName }}
          JOB_ID: ${{ inputs.jobid }}
          API_URL: "http://localhost:8880/v1/audio/speech"
          REPO_INFO: "${{ github.repository_owner }}/mCloudTTS"
          RELEASE_TAG: ${{ inputs.releasetag }}
        run: |
          python <<EOF
          import os, json, requests, datetime, hashlib, time, wave
          from mutagen import File
          from pathlib import Path

          def get_voice_profile(v):
              m = {"af_": ("English", "Female", "USA"), "am_": ("English", "Male", "USA"),
                   "bf_": ("English", "Female", "UK"), "bm_": ("English", "Male", "UK"),
                   "jf_": ("Japanese", "Female", "Japan"), "zm_": ("Chinese", "Male", "China"),
                   "zf_": ("Chinese", "Female", "China"), "es_": ("Spanish", "Mix", "Spain"),
                   "fr_": ("French", "Mix", "France"), "hi_": ("Hindi", "Mix", "India")}
              for k, val in m.items():
                  if v.startswith(k): return {"lang": val[0], "gender": val[1], "region": val[2]}
              return {"lang": "Unknown", "gender": "Unknown", "region": "Unknown"}

          def format_duration(s):
              if s < 60: return f"{round(s, 2)}s"
              return f"{round(s/60, 2)}m"

          def get_audio_duration(path, fmt):
              try:
                  if fmt in ['wav', 'pcm']:
                      size = os.path.getsize(path)
                      return max(0, (size - (44 if fmt == 'wav' else 0)) / 48000)
                  audio = File(path)
                  return audio.info.length if audio and audio.info else 0
              except: return 0

          voice = os.getenv("INPUT_VOICE")
          formats = [f.strip() for f in os.getenv("INPUT_FORMATS").split(",")]
          raw_proj = os.getenv("PROJECT_NAME")
          proj_id, proj_title = map(str.strip, raw_proj.split(":", 1)) if ":" in raw_proj else ("GEN", raw_proj)
          
          out_dir = Path("out")
          out_dir.mkdir(exist_ok=True)
          results = []

          with requests.Session() as s:
              for fmt in formats:
                  safe_v = voice.replace("(", "").replace(")", "").replace("+", "_")
                  fname = f"{proj_title.replace(' ', '_')}_{safe_v}.{fmt}"
                  fpath = out_dir / fname
                  
                  payload = {"model": "kokoro", "input": os.getenv("INPUT_TEXT"), "voice": voice, "response_format": fmt, "speed": float(os.getenv("INPUT_SPEED"))}
                  resp = s.post(os.getenv("API_URL"), json=payload, timeout=300)
                  if resp.status_code == 200:
                      fpath.write_bytes(resp.content)
                      dur = get_audio_duration(fpath, fmt)
                      profile = get_voice_profile(voice)
                      results.append({
                          "name": fname, "project": proj_id, "jobid": os.getenv("JOB_ID"),
                          "url": f"https://github.com/{os.getenv('REPO_INFO')}/releases/download/{os.getenv('RELEASE_TAG')}/{fname}",
                          "title": f"{proj_title} ({voice})", "lang_code": os.getenv("INPUT_LANGUAGE"),
                          "voice_id": voice, "gender": profile["gender"], "duration": round(dur, 2),
                          "duration_readable": format_duration(dur), "size_bytes": len(resp.content),
                          "timestamp": datetime.datetime.now(datetime.timezone.utc).isoformat()
                      })
          
          Path("fragment.json").write_text(json.dumps(results))
          EOF

      - name: 🚀 Upload Assets to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.releasetag }}
          files: out/*
          token: ${{ secrets.GH_PERSONAL_TOKEN }}
          repository: TheOpsGuru/mCloudTTS

      - name: 📤 Upload Fragment
        uses: actions/upload-artifact@v4
        with:
          name: fragment-${{ matrix.voice }}
          path: fragment.json

  # --- JOB 3: MERGE & SYNC ---
  finalize:
    needs: generate
    runs-on: ubuntu-latest
    concurrency:
      group: tts-storage-sync
    steps:
      - name: 📥 Checkout Storage
        uses: actions/checkout@v4
        with:
          repository: TheOpsGuru/mCloudTTS
          token: ${{ secrets.GH_PERSONAL_TOKEN }}
          ref: main

      - name: 📥 Download all fragments
        uses: actions/download-artifact@v4
        with:
          pattern: fragment-*
          merge-multiple: true

      - name: 🧩 Consolidate Metadata
        run: |
          python <<EOF
          import os, json, glob
          from pathlib import Path

          main_file = Path("samples.json")
          data = {"project": "mCloudTTS", "voices": []}
          if main_file.exists():
              with open(main_file, 'r') as f: data = json.load(f)

          existing = {v['name']: v for v in data.get('voices', [])}
          
          # Merge fragments
          for frag_path in glob.glob("fragment.json") + glob.glob("fragment-*.json"):
              with open(frag_path, 'r') as f:
                  new_entries = json.load(f)
                  for entry in new_entries:
                      existing[entry['name']] = entry

          data['voices'] = list(existing.values())
          with open(main_file, 'w') as f:
              json.dump(data, f, indent=2)
          EOF

      - name: 💾 Commit samples.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: parallel update samples.json [job ${{ inputs.jobid }}]"
          file_pattern: 'samples.json'