name: mCloudTTS-Pro (Enhanced)
run-name: 'mCloudTTS-Pro: ${{ inputs.jobid || github.run_id }}'

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Language Code'
        required: true
        default: 'en-us'
        type: choice
        options: [en-us, en-gb, ja-jp, zh-cn, es-es, fr-fr, hi-in, it-it, pt-br]
      voices:
        description: 'Voices (comma separated)'
        required: true
        default: 'af_bella,af_sky,af_bella(2)+af_heart(1)'
      response_format:
        description: 'Audio Formats'
        required: true
        default: 'mp3,wav,opus,flac,m4a,pcm'
      speed:
        description: 'Speed (0.5 - 2.0)'
        required: true
        default: '1.0'
      projectName:
        description: 'Project (Format: ProjID: Title)'
        required: true
        default: 'MT-001: Test Project'
      text:
        description: 'Input Text'
        required: true
        default: 'Welcome to mCloudTTS-Pro, the next generation of cloud-based speech synthesis.'
      jobid:
        description: 'Custom Job ID'
        required: false
      releasetag:
        description: 'Release tag'
        default: 'mTTS'
        required: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    services:
      kokoro:
        image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
        ports: ["8880:8880"]
        options: >-
          --health-cmd "curl -f http://localhost:8880/v1/models || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          repository: TheOpsGuru/mCloudTTS
          token: ${{ secrets.GH_PERSONAL_TOKEN }}
          ref: master
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |  
          echo "[Memory]"; free -h; echo -e "\n[CPU Usage]"; top -bn1 | grep "Cpu(s)" | sed "s/.*, *\([0-9.]*\)%* id.*/\1/" | awk '{print 100 - $1"% Usage"}'
          pip install requests mutagen

      - name: 🎙️ Generate & Sync
        env:
          INPUT_TEXT: ${{ inputs.text }}
          INPUT_LANGUAGE: ${{ inputs.language }}
          INPUT_VOICES: ${{ inputs.voices }}
          INPUT_FORMATS: ${{ inputs.response_format }}
          INPUT_SPEED: ${{ inputs.speed }}
          PROJECT_NAME: ${{ inputs.projectName }}
          JOB_ID: ${{ inputs.jobid }}
          API_URL: "http://localhost:8880/v1/audio/speech"
          REPO_INFO: "${{ github.repository_owner }}/mCloudTTS"
          RELEASE_TAG: ${{ inputs.releasetag }}
        run: |
          python <<EOF
          import os, json, requests, datetime, hashlib, time, subprocess
          from mutagen import File
          from pathlib import Path

          def get_meta(v):
              m = {"af_": ("English", "Female", "USA"), "am_": ("English", "Male", "USA"),
                   "bf_": ("English", "Female", "UK"), "bm_": ("English", "Male", "UK"),
                   "jf_": ("Japanese", "Female", "Japan"), "zm_": ("Chinese", "Male", "China")}
              for k, val in m.items():
                  if v.startswith(k): return {"lang": val[0], "gender": val[1], "region": val[2]}
              return {"lang": "Unknown", "gender": "Unknown", "region": "Unknown"}

          def fmt_dur(s):
              if s <= 0: return "0s"
              return f"{round(s, 2)}s" if s < 60 else f"{round(s/60, 2)}m"

          def get_dur(path, fmt):
              try:
                  if fmt in ['wav', 'pcm']:
                      return max(0, (os.path.getsize(path) - (44 if fmt == 'wav' else 0)) / 48000)
                  audio = File(path)
                  return audio.info.length if audio and audio.info else 0
              except: return 0

          # Setup
          job_id = os.getenv("JOB_ID") or f"mt-{int(time.time())}"
          voices = [v.strip() for v in os.getenv("INPUT_VOICES").split(",") if v.strip()]
          formats = [f.strip() for f in os.getenv("INPUT_FORMATS").split(",") if f.strip()]
          p_id, p_title = map(str.strip, os.getenv("PROJECT_NAME").split(":", 1)) if ":" in os.getenv("PROJECT_NAME") else ("GEN", os.getenv("PROJECT_NAME"))
          
          out_dir = Path("generated_files")
          out_dir.mkdir(exist_ok=True)
          results, session = [], requests.Session()

          # Generation
          for v in voices:
              for fmt in formats:
                  fname = f"{p_title.replace(' ', '_')}_{v.replace('+', '_').replace('(','').replace(')','')}.{fmt}"
                  fpath = out_dir / fname
                  try:
                      payload = {"model": "kokoro", "input": os.getenv("INPUT_TEXT"), "voice": v, "response_format": fmt, "speed": float(os.getenv("INPUT_SPEED"))}
                      resp = session.post(os.getenv("API_URL"), json=payload, timeout=300)
                      if resp.status_code == 200:
                          fpath.write_bytes(resp.content)
                          d = get_dur(fpath, fmt)
                          p = get_meta(v)
                          results.append({
                              "jobid": job_id, "name": fname, "project": p_id,
                              "url": f"https://github.com/{os.getenv('REPO_INFO')}/releases/download/{os.getenv('RELEASE_TAG')}/{fname}",
                              "title": f"{p_title} ({v})", "lang_code": os.getenv("INPUT_LANGUAGE"),
                              "voice_id": v, "gender": p["gender"], "duration_seconds": round(d, 2),
                              "duration_readable": fmt_dur(d), "size_bytes": len(resp.content),
                              "timestamp": datetime.datetime.now(datetime.timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
                          })
                          print(f"✅ {fname}")
                  except Exception as e: print(f"⚠️ Error {fname}: {e}")

          # Sync
          subprocess.run(["git", "config", "user.name", "github-actions[bot]"])
          subprocess.run(["git", "config", "user.email", "github-actions[bot]@users.noreply.github.com"])
          
          json_path, success = Path("samples.json"), False
          for i in range(10):
              try:
                  subprocess.run(["git", "pull", "--rebase", "origin", "master"], check=True)
                  
                  if json_path.exists():
                      with open(json_path, 'r') as f: data = json.load(f)
                  else:
                      data = {"project": "mCloudTTS", "release": "mTTS", "description": "Batch audio files", "voices": []}
                  
                  voice_map = {v['name']: v for v in data.get('voices', [])}
                  for r in results:
                      voice_map[r['name']] = r
                  
                  data['voices'] = list(voice_map.values())
                  json_path.write_text(json.dumps(data, indent=2))
                  
                  if subprocess.run(["git", "status", "--porcelain"], capture_output=True, text=True).stdout.strip():
                      subprocess.run(["git", "add", "samples.json"], check=True)
                      subprocess.run(["git", "commit", "-m", f"{p_id}: update {job_id} [skip ci]"], check=True)
                      if subprocess.run(["git", "push", "origin", "master"]).returncode == 0:
                          success = True; break
                  else: success = True; break
              except Exception as e:
                  print(f"Sync error (attempt {i+1}): {e}")
                  time.sleep(2)

          if not success: exit(1)

          # Summary
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as s:
              s.write(f"### 🎙️ TTS Summary (Job: {job_id})\n| File | Voice | Duration | Size |\n|---|---|---|---|\n")
              for r in results: s.write(f"| {r['name']} | {r['voice_id']} | {r['duration_readable']} | {round(r['size_bytes']/1024, 2)} KB |\n")
          EOF

      - name: 🚀 Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.releasetag }}
          body: |
            ### 🛠️ Build Information
            - **Job ID:** `${{ inputs.jobid || github.run_id }}`
            - **Generated At:** ${{ github.event.repository.updated_at }}
          files: generated_files/*
          token: ${{ secrets.GH_PERSONAL_TOKEN }}
          repository: TheOpsGuru/mCloudTTS