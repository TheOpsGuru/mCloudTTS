name: Open TTS Generation

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Text to convert to speech'
        required: true
        type: string
        default: 'Automated audio generation from Open TTS Workflow'
      voice:
        description: 'Edge Voice Name'
        required: true
        default: 'en-IN-NeerjaNeural'
        type: string
      rate:
        description: 'Speech rate (e.g., -10%, +20%)'
        required: false
        default: '0%'
        type: string
      pitch:
        description: 'Pitch (e.g., 0Hz)'
        required: false
        default: '0Hz'
        type: string
      job_id:
        description: 'Unique Job ID for the filename'
        required: true
        type: string

jobs:
  generate-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      opentts:
        image: harry97/opentts:latest
        ports:
          - 8000:8000

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Generate Audio
        shell: python
        run: |
          import requests, time, sys

          BASE_URL = "http://localhost:8000/api/v1"
          OPTS = {
              "text": """${{ github.event.inputs.text }}""",
              "voice": "${{ github.event.inputs.voice }}",
              "rate": "${{ github.event.inputs.rate }}",
              "pitch": "${{ github.event.inputs.pitch }}",
              "volume": "100%"
          }
          FILE = f"${{ github.event.inputs.job_id }}.${OPTS['voice']}.mp3"

          # Wait for service (max 60s)
          for _ in range(12):
              try:
                  if requests.get(f"{BASE_URL}/health").status_code == 200: break
              except: pass
              time.sleep(5)
          else: sys.exit("Service failed to start")

          # Request and Save
          try:
              res = requests.post(f"{BASE_URL}/tts", json=OPTS)
              res.raise_for_status()
              with open(FILE, "wb") as f: f.write(res.content)
              print(f"Saved: {FILE}")
          except Exception as e:
              sys.exit(f"TTS Failed: {e}")

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: OpenTTS-assets
          name: "Generated TTS Assets"
          body: "Automated audio generation from Open TTS Workflow."
          files: "${{ github.event.inputs.job_id }}*.mp3"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PERSONAL_TOKEN }}
