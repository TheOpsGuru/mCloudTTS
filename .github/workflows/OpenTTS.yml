name: Open TTS Generation

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Text to convert to speech'
        required: true
        type: string
        default: 'Automated audio generation from Open TTS Workflow'
      voice:
        description: 'Edge Voice Name'
        required: true
        default: 'en-IN-NeerjaNeural'
        type: string
      rate:
        description: 'Speech rate (e.g., -10%, +20%)'
        required: false
        default: '0%'
        type: string
      pitch:
        description: 'Pitch (e.g., 0Hz)'
        required: false
        default: '0Hz'
        type: string
      job_id:
        description: 'Unique Job ID for the filename'
        required: true
        type: string

jobs:
  generate-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      opentts:
        image: harry97/opentts:latest
        ports:
          - 8000:8000
        # options: >-
        #   --health-cmd "curl -f http://127.0.0.1:8000/api/v1/health || exit 1"
        #   --health-interval 10s
        #   --health-timeout 5s
        #   --health-retries 8

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Wait for TTS Service
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:8000/api/v1/health; then
              echo "Service is up!"
              exit 0
            fi
            echo "Waiting for TTS service..."
            sleep 5
          done
          exit 1

      - name: Generate Audio File
        run: |
          curl -X POST http://localhost:8000/api/v1/tts \
            -H "Content-Type: application/json" \
            -d '{
              "text": "${{ github.event.inputs.text }}",
              "voice": "${{ github.event.inputs.voice }}",
              "rate": "${{ github.event.inputs.rate }}",
              "pitch": "${{ github.event.inputs.pitch }}",
              "volume": "100%"
            }' \
            --output "${{ github.event.inputs.job_id }}.${{ github.event.inputs.voice }}.mp3"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: OpenTTS-assets
          name: "Generated TTS Assets"
          body: "Automated audio generation from Open TTS Workflow."
          files: "${{ github.event.inputs.job_id }}*.mp3"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PERSONAL_TOKEN }}
