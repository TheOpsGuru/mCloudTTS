name: Edge TTS Generation

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Text to convert to speech (max 2000 chars)'
        required: true
        type: string
      voice:
        description: 'Edge Voice Name'
        required: true
        default: 'en-US-AvaMultilingualNeural'
        type: string
      rate:
        description: 'Speech rate adjustment (-50 to +50)'
        required: false
        default: '0'
        type: number
      pitch:
        description: 'Pitch adjustment in semitones (-10 to +10)'
        required: false
        default: '0'
        type: number
      job_id:
        description: 'Unique Job ID (alphanumeric, 3-32 chars)'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    services:
      edge-tts:
        image: gerardtoko/edge-tts-api:latest
        ports: ["8080:8080"]
        options: >-
          --health-cmd "curl -f http://localhost:8080/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Validate inputs
        id: validate
        run: |
          job_id="${{ github.event.inputs.job_id }}"
          text="${{ github.event.inputs.text }}"
          
          [[ "$job_id" =~ ^[a-zA-Z0-9_-]{3,32}$ ]] || { echo "❌ Invalid job_id"; exit 1; }
          [[ ${#text} -gt 0 && ${#text} -le 2000 ]] || { echo "❌ Invalid text length"; exit 1; }
          
          echo "job_id=$job_id" >> "$GITHUB_OUTPUT"
          echo "text=$text" >> "$GITHUB_OUTPUT"

      - name: Generate audio via API
        id: generate
        env:
          TEXT: ${{ steps.validate.outputs.text }}
          VOICE: ${{ github.event.inputs.voice }}
          RATE: ${{ github.event.inputs.rate }}
          PITCH: ${{ github.event.inputs.pitch }}
          JOB_ID: ${{ steps.validate.outputs.job_id }}
        run: |
          output="output-${JOB_ID}.mp3"
          
          # Build query params
          params="voice=${VOICE}"
          [ "$RATE" != "0" ] && params="${params}&rate=$( [ $RATE -ge 0 ] && echo + || : )${RATE}%"
          [ "$PITCH" != "0" ] && params="${params}&pitch=$( [ $PITCH -ge 0 ] && echo + || : )${PITCH}st"
          
          # Call TTS API
          curl -fsSL "http://localhost:8080/tts?${params}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"$TEXT\"}" \
            -o "$output" || { echo "❌ API request failed"; exit 1; }
          
          # Verify output
          [ -s "$output" ] && [ $(stat -c%s "$output" 2>/dev/null || stat -f%z "$output" 2>/dev/null) -gt 2048 ] || { echo "❌ Invalid audio file"; exit 1; }
          
          echo "output_path=$output" >> "$GITHUB_OUTPUT"
          echo "size=$(du -h "$output" | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tts-${{ steps.validate.outputs.job_id }}
          path: ${{ steps.generate.outputs.output_path }}
          retention-days: 7
